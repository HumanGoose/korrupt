apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-bomb
  labels:
    app: memory-bomb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-bomb
  template:
    metadata:
      labels:
        app: memory-bomb
    spec:
      containers:
      - name: memory-bomb
        image: polinux/stress
        resources:
          limits:
            memory: "64Mi"
          requests:
            memory: "32Mi"
        command: ["stress"]
        args: ["--vm", "1", "--vm-bytes", "200M", "--vm-hang", "1"]
